<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calendrier Scolaire</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f9; margin: 0; padding: 20px; }
        .calendar-container { max-width: 900px; margin: auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .controls { display: flex; gap: 10px; }
        select, button { padding: 8px 12px; font-size: 16px; border-radius: 4px; border: 1px solid #ccc; cursor: pointer; }
        button { background-color: #007bff; color: white; border: none; }
        button:hover { background-color: #0056b3; }
        .grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 10px; }
        .day-name { font-weight: bold; text-align: center; background: #e2e2e2; padding: 10px; border-radius: 4px; }
        .day { background: #fff; border: 1px solid #ddd; min-height: 100px; padding: 5px; border-radius: 4px; position: relative; }
        .day.empty { background: #f9f9f9; border: none; }
        .day-number { font-weight: bold; margin-bottom: 5px; }
        .event { background: #e1f5fe; color: #0288d1; padding: 4px; border-radius: 4px; font-size: 12px; margin-top: 4px; white-space: pre-wrap; }
    </style>
</head>
<body>

<div class="calendar-container">
    <div class="header">
        <h2 id="monthYearDisplay"></h2>
        <div class="controls">
            <select id="periodSelect" onchange="updateCalendar()">
                <option value="period1">Période 2</option>
                <option value="period2">Période 3B</option>
                <option value="period3">Période 4</option>
            </select>
            <button onclick="prevMonth()">Précédent</button>
            <button onclick="nextMonth()">Suivant</button>
        </div>
    </div>

    <div class="grid" id="calendarGrid"></div>
</div>

<script>
    let currentMonth = 8; // Septembre
    let currentYear = 2026;
    let events = {};

    const monthNames = ["Janvier", "Février", "Mars", "Avril", "Mai", "Juin", "Juillet", "Août", "Septembre", "Octobre", "Novembre", "Décembre"];

    function generateCalendar(month, year) {
        const grid = document.getElementById('calendarGrid');
        const display = document.getElementById('monthYearDisplay');
        const selectedPeriod = document.getElementById('periodSelect').value;
        
        grid.innerHTML = '';
        display.innerText = `${monthNames[month]} ${year}`;

        const dayNames = ["Dim", "Lun", "Mar", "Mer", "Jeu", "Ven", "Sam"];
        dayNames.forEach(name => {
            let div = document.createElement('div');
            div.className = 'day-name';
            div.innerText = name;
            grid.appendChild(div);
        });

        let firstDay = new Date(year, month, 1).getDay();
        let daysInMonth = new Date(year, month + 1, 0).getDate();

        for (let i = 0; i < firstDay; i++) {
            let div = document.createElement('div');
            div.className = 'day empty';
            grid.appendChild(div);
        }

        for (let day = 1; day <= daysInMonth; day++) {
            let div = document.createElement('div');
            div.className = 'day';
            
            let numDiv = document.createElement('div');
            numDiv.className = 'day-number';
            numDiv.innerText = day;
            div.appendChild(numDiv);

            // Match formatted date keys
            let meshMonth = String(month + 1).padStart(2, '0');
            let meshDay = String(day).padStart(2, '0');
            let dateKey = `${year}-${meshMonth}-${meshDay}`;

            if (events[dateKey] && events[dateKey][selectedPeriod]) {
                let eventDiv = document.createElement('div');
                eventDiv.className = 'event';
                eventDiv.innerText = events[dateKey][selectedPeriod];
                div.appendChild(eventDiv);
            }

            grid.appendChild(div);
        }
    }

    function loadEventsFromGoogleSheet() {
    const sheetUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vT1nO7Z8-25ZzQyOQ-5h2Y6h8vY_q2tT8C-9yO8k_Y8N8x9L6u_Z3_M6pB-B7V8X/pub?output=csv';

    fetch(sheetUrl)
        .then(response => response.text())
        .then(data => {
            if (!data) return;
            let rows = data.split(/\r?\n/).slice(1); // Handles line endings safely
            events = {}; // Reset events object

            rows.forEach(row => {
                if (!row.trim()) return;
                let columns = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                
                if (columns.length >= 3) {
                    let rawDate = columns[0].trim().replace(/^"|"/g, '');
                    let rawPeriod = columns[1].trim().toUpperCase().replace(/^"|"/g, '');
                    let eventText = columns[2] ? columns[2].replace(/^"|"/g, '').replace(/\\n/g, '\n').trim() : "";

                    // Force the spreadsheet date format to match your calendar's padded key (YYYY-MM-DD)
                    let dateStr = "";
                    let dateParts = rawDate.split('-');
                    if (dateParts.length === 3) {
                        let year = dateParts[0];
                        let month = String(parseInt(dateParts[1], 10)).padStart(2, '0');
                        let day = String(parseInt(dateParts[2], 10)).padStart(2, '0');
                        dateStr = `${year}-${month}-${day}`;
                    } else {
                        dateStr = rawDate;
                    }

                    // Map spreadsheet text directly to your template dropdown values
                    let periodKey = "";
                    if (rawPeriod === "2") periodKey = "period1";
                    else if (rawPeriod === "3B" || rawPeriod === "3") periodKey = "period2";
                    else if (rawPeriod === "4") periodKey = "period3";

                    if (dateStr && periodKey) {
                        if (!events[dateStr]) events[dateStr] = {};
                        events[dateStr][periodKey] = eventText;
                    }
                }
            });
            // Re-render the layout with the correctly structured items
            generateCalendar(currentMonth, currentYear);
        })
        .catch(error => {
            console.error('Error loading data:', error);
            generateCalendar(currentMonth, currentYear);
        });
}

    function updateCalendar() { generateCalendar(currentMonth, currentYear); }
    function prevMonth() { currentMonth--; if(currentMonth < 0) { currentMonth = 11; currentYear--; } updateCalendar(); }
    function nextMonth() { currentMonth++; if(currentMonth > 11) { currentMonth = 0; currentYear++; } updateCalendar(); }

    window.onload = function() { loadEventsFromGoogleSheet(); };
</script>

</body>
</html>
